# App
spring.application.name=portfolio-simulator

# DataSource
spring.datasource.url=jdbc:postgresql://db:5432/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Cache
spring.cache.type=simple

# Server
server.port=8080

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Alpha Vantage
alphavantage.api-key=${ALPHAVANTAGE_API_KEY}
alphavantage.base-url=${ALPHAVANTAGE_BASE_URL}
alphavantage.cache-duration-minutes=15

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# Error handling
server.error.include-stacktrace=never
server.error.include-message=never